body:
  text: 侍者德初義初等編上堂僧問三世諸佛向火焰裏轉大法輪還端的也無師呵呵大笑云我却疑著僧云和尚為什麼却疑著師云野花香滿路幽鳥不知春僧禮拜云今日遭人毒手師乃云柳眼爭芳風煙混秀未露處密移春色不萌時暗染溪光寒岩樵子歌謠野渡漁人鼓腹所以道正則龍銜異寶偏則鶴宿銀籠且道不落偏正作麼生相委良久云萬機休罷處一曲韻無私上堂僧問如經蠱毒之鄉水也不得霑他一滴未審此意如何師云及盡始通身僧云通身後如何師云方知撲不破師乃云不假舌頭說熾然無閒歇深密密處光彩頓生明歷歷時混融皎潔若也和身放倒隨流任真始信百般計較不成運用本無欠缺雖然恁麼金屑雖貴落眼成翳上堂僧問百艸頭上罷却平生時如何師云亦無藏身處僧云恁麼則遍界露堂堂師云切忌作面目僧云不作面目又作麼生師云泥牛觸破嶺頭雲師乃云卓錐無地甚處安身瞬目不通如何駐擬所以把定乾坤眼綿綿不漏絲毫融通造化機的的更無滲漏正恁麼時打破𦘕缾一句作麼生相委良久云雲散水流去寂然天地空上堂傍參密旨妙會玄宗句在混沌前豈涉今時路無舌人解語無情者皆聞通途消耗不分時靈脈浩流無閒處且道不借借底作麼生良久云堆堆全體露祗麼不曾藏上堂僧問不露風彩還許轉身也無師云石女行處不同功僧云向上事作麼生師云妙在一漚前豈容千聖眼僧禮拜師云只恐不恁麼師乃云智不到處道著即頭角生心不泯時認著即影像現百匝千重都擺撥騰今照古本無虧木雞啼斷海雲昏石虎嘯開山色秀光境俱亡即且置不授手底是什麼人良久云青松生古韻白髮咲寒巖上堂云機輪密處靈艸未生溢目不登揚眉自曉有時意到句不到白雲藏玉鳳有時句到意不到秋露滴銀河有時意句俱到妙盡不當今虗明不出戶且道意句俱不到又作麼生良久云不傳千聖口莫向萬機求上堂云暗裏抽橫骨彌天句已彰明中坐舌頭匝地無紋彩混不容其迹照不留其痕金烏子夜出乾坤濃雲停午生嶽面且道須彌那畔什麼人擔荷良久云莫行玄處路功盡合平常上堂僧問如何是學不停午師云海底銀輪秀僧云如何是意不立玄師云無影樹頭春僧云恁麼則未露之機當鋒得妙師云亦須轉却僧云轉却後如何師云不墮混融機師乃云窮微喪本體妙失宗一句截流淵源及盡是以金針密處不露光鋩玉線通時潛舒異彩雖然如是猶是交互雙明且道巧拙不到作麼生相委良久云雲蘿秀處青陰合岩樹高時翠鎖深上堂云轉功就位是向去底人玉韞荊山貴轉位就功是却來底人紅爐片雪春功位俱轉通身不滯撒手忘依石女夜登機密室無人掃正恁麼時絕氣息一句作麼生相委良久云歸根風墮葉照盡月潭空上堂云麤中辨細門裏出身石女不孤機梭暗泄細中辨麤身裏出門暖氣雖消岩上雪冰壺未破劫前春六門活計冷翛然萬頃瑠璃寒徹骨且道滴水滴凍一句作麼生相委良久云歸堂問取聖僧上堂云居動而常寂處暗而愈明不墮二邊機當頭誰敢觸正按傍提有據真慈妙應無窮雖然句在未萌前要且不離當處且道畢竟如何白雲留不住依舊出青霄上堂僧問泥牛常運步為什麼不許觸波瀾師云虗空暗點頭僧云恁麼則子就父時猶有依倚師云更有一人未肯在僧云未審是什麼人師云紅爛通身火裏看師乃云虗玄及盡見處偏枯明湛不搖想中滲漏是以千峰瀉翠萬谷流春靈苗秀而氣未萌瑞彩分而天欲曉光融水月影混空潭叶照忘痕如何辨異木龍吟子夜妙在未聞前上堂云藏身處沒蹤跡浩意融時誰辨的沒蹤跡處莫藏身驀移步處妙難尋枯根石裏花明秀劫外威光密密新所以道三十年在藥山只明此事諸仁者作麼生是此事良久云白髮顏如玉靈然不墮今上堂云無功妙旨不涉玄微一念潛通全機密運易奏高山流水曲難傳虗空夜明符暗中靈句許誰知化外威光須自看雖然恁麼不行青嶂路爭到白雲根上堂云妙化潛敷無中忽有漚紋纔擬失湛乖真九霄淨處廓無疆四海清時明徹底若知有者箇消息堪報不報之恩其或未然天水混時秋一色眾星攢處紫微高上堂云家音歷歷的要難通紹了非功忘其擔荷戶外有雲從斷徑坐中無照勝燃燈既知活計現成便合深沈消耗為什麼更有途中事良久云功齊超歷劫運步不當陽上堂僧問密密現成還得尊貴也無師云用在萬機前不勞呈巧妙僧云恁麼則一句靈然通途絕朕師云是阿那箇一句僧擬議師云過犯彌天師乃云剎塵一掃大小量空念劫兩融前後際斷不離當處圓應無窮安住是中周施不怠正恁麼時木童敲月戶六用虗明石筍暗抽條孤標秀密且道是誰境界良久云江岸風濤急蘆村景色幽上堂云見聞不昧聲色純真動靜無虧去留本妙若也盡底承當得去始信法法圓成便能隨處立宗返常合道其或未然滿襟秋露濕一鑑冷無痕上堂云未休休去未歇歇去豁然寶鏡當臺無限清光滿戶所以道一句子當明不當照一句子當照不當明若或當照當明又作麼生良久云枯枝頭上雪不待大陽春上堂云莫怪石頭饒舌便道靈源明皎潔功成照不失虗妙盡明無間歇如今果爾難藏盡逐秋光漏泄為報海內道人參取箇中時節上堂僧問午燈非照燭夜炬滿天紅時如何師云猶墮傍來路僧云如何是向上之機師云明暗盡時俱不照師乃云披毛遊火聚焰裏藏身戴角混塵泥光中轉步靈珠絕點卞玉無瑕一念廓融千機秀發正恁麼時坐却傍來路子更有道得底良久云歷然超化表浩劫體難分上堂云明簾未捲祕殿舒光妙體潛彰真機尚密直得龍吟碧海鳳舞丹霄大地鋪祥長空布瑞正恁麼時借位誕生一句作麼生相委良久云金印未開沙界靜玉輪轉處不當風上堂云裏許明如日絲毫無隔礙一靈不假胞胎四大孰為主宰如今徹底露堂堂運用隨緣常自在雖然如是猶是平常行履且道超宗越格如何相委虗空無面目不用巧糚眉上堂云終日分別只是分別自心堪笑念彼觀音力畢竟還著於本人黃頭老衲有理難伸為什麼有理難伸賊是家親上堂僧問影草不施千途罷賞未審其中事作麼生師云當堂不正坐僧云恁麼則全功轉去也師云轉向什麼處去僧云古渡月明秋色晚師云須是者驢漢師乃云人迷曉徑戶掛凋林出沒混融凝流皎潔妙體靈然無影迹通身及盡不當陽水聲松韻一溪深月色波光全體妙正恁麼時落在誰人分上良久云滿船空不夜穩密上鉤時上堂云雨洗摩尼增秀色全身不昧一絲頭靈源傾瀉無閒歇添得滁山水逆流所以道真慈妙應赴感隨緣大寂光中本無出沒雖然恁麼不因登絕頂爭見白雲高上堂云鏡鏡相照光光相入猶是影像邊事頭頭上現物物上明呼為了事底人直饒不涉緣不受位全機混密一念浩融猶有類在作麼生是異類良久云門門無隱的妙在未分時上堂云密密親近去時時奉重他猶存孝養在不見親近孝養奉重始得尊貴雖然恁麼烏兔任從更互照碧霄雲外不相干上堂僧問不慕諸聖不重己靈時如何師云古鏡臺前荒艸秀僧云便恁麼去時如何師云金烏銜片雲師乃云沿流無定止真照不留蹤千峯秀處鶴難栖萬水澄時魚自穩樵人罷賞釣客迷巢古渡深雲同歌絕韻正恁麼時知音底在什麼處良久云玉兔常當午白日不移輪上堂云勝淨妙心本周沙界精真廓爾明白洞然靈花密秀異前春風味混成塵外句直得寒林布彩野水流芳寂爾不凝如何體異當陽不踏今時路得意無私鳥道玄上堂云日月鎮長靈古今常不改如何特地新各要施三拜及盡無依體自玄雙六盆中休喝彩作麼生辨得失良久云十語九中不如一默上堂僧問古路不逢人時如何師云相隨來也僧云恁麼則萬像光中全身出沒師云猶是往來人僧云如何是非往來人師云古路覓不得師乃云一牛飲水密混溪雲五馬不嘶暗彰風骨不落曉機即且置太綿密忒靈現作麼生回互良久云白頭蠶婦織歷歷夜鳴梭上堂云機回明位妙盡轉身一夢青山滿船白月子夜雲收碧漢中秋露混銀河蘆花深處驀相逢談咲飲茶無處避正恁麼時更須知有一人不合伴上堂云靈鷲深機少林密旨山岳高低而共唱水雲去住而自聞得之者頭角強生失之者功勳徒爾所以道莫求悟本無迷日出東方夜沈西雖然恁麼且道據箇什麼良久云不勞澄九鼎流動百花新上堂云離心意識達本忘情千聖頂𩕳撥開萬象根源徹透當明隱照入戶忘歸野老謳歌石人撫掌正當恁麼時還有知落處底麼良久云雪山香艸秀不見白牛蹤上堂云百億毛頭花開不犯春風三冬雪裏爭芳全彰浩意雲凝谷曉滴水冰生活計現成憑誰受用良久云頭上青灰三五斗明明不墮曉來機上堂云祇恁麼休尋覓見成堂堂忘得失假使心通無量時歷劫何曾異今日呵呵大笑云聖僧堂裏坐金剛門外立廣長舌相耀乾坤半夜烏飛白如漆上堂僧問皮膚脫落盡唯有一真實未審其中事作麼生師云戶掩春風不停宿客僧云恁麼則綠岩雲抱處幽蘚翠成堆師喝云猶嫌少在師乃云一念未生時萬里無寸艸通身紅爛處徧界不曾藏鳥道忘依雲蹤有異直得恁麼猶是究妙失宗所以道任你天下人樂忻忻獨我不肯且道據箇甚麼良久云魚行沙暗動終不犯清波上堂云默耀堂堂現成密密通途隱的回互難分家風孤寂妙明前活計荒虗玄路外若能撒手恁麼去絕後再甦橫身恁麼來當頭不犯始解隨變任化與物推移其或未然雲藏無影樹丹鳳不棲梧上堂云鶴夢無依寒巢臥月雲容不掛野渡澄明功忘莫守玄微位轉須知向背所以道凋林迥秀靈棹密移一句截流如何辨異還知端的麼白牛耕盡寒岩雪禽鳥不鳴天地春上堂云運步不當機箇中無肯路明密浩難齊未前超佛祖及盡回途恁麼來撒手相逢無回互所以道一切處行履一切處不收一切處現成一切處莫覩山僧今日也太無端上堂云旨外明宗玄中辨的古帆不掛洞水逆流黃蘆渡口奏陽春偃月城頭吹畫角豈止異苗繁茂須知別有圓音更休爛炒浮漚便請乘時撒手且道落在什麼人分上良久云錦繡溪邊去新豐路上分上堂云風暖寒堤春回草綠雲迷古路家破人亡大陽門下覓無蹤枯木岩前花自咲直得髑髏吟處韻韻難齊雪月混時功功不共諸仁者到者裏且作麼生措手良久云靈絲動處金鉤密不觸波瀾暗裏收上堂云移身密處意句難通驀路分時風雲迥秀戶外野花開似錦造化不知岩前芳艸軟如緜隨根自發豈在忘機息息斷臂安心大施門開更無辜負雖然恁麼春力不到處空山中夜泉上堂云純清絕點似鏡長明照不失虗萬像體妙細中之細雪盡冰消功就之功任運現成諸仁者還知有不鑒照底良久云枯樁花爛熳青艸渡頭空上堂云世尊有密語古渡春殘迦葉不覆藏落花流水見聞覺知絕四維上下通玉鳳舞中霄金輪舒半夜正恁麼時作麼生是不驚異良久云海底驪珠貴光分宇宙迷上堂云不變異處未可安身無閒斷時更須放下直得羚羊掛角氣息都無猶滯化城未到寶所且道混不得類不齊合作麼生玉壺霜漏永天外翠峯高上堂云幻滅滅故非幻不滅光無不透明無不徹長歌吹起棹頭風永夜恣眠篷底月正恁麼時浮定有無釣機密泄三寸離鉤要知時節既知時節為什麼却容露柱多口饒舌良久云却是長蘆倒一說上堂云歇須歇得靈用須用得密丹霄步轉清曉風迥野菊含金山川漱玉正恁麼時作麼生是一念萬年良久云六戶明如晝懸崖撒手看上堂云舟移遠浦風度長淮秋露滿襟寒江溢目隱顯以明不觸相逢兩刃無傷是須陌路到家休問沿流時節雖然恁麼不迴古木暖爭辨石頭吟上堂云大徹底人無徹可徹大歇底人無歇可歇非但玉樹開花亦乃石人腦裂少林三拜強荼糊至今有理難分雪上堂云風光溢目翠色滿林香嚴上樹之機夾嶺出身之句直下道得堪報不報之恩其或未然祥雲籠紫閣瑞雪點紅爐上堂云朝晡飲無處藏身乃顧謂大眾曰祇今東邊也著西邊也著還有迴避得麼良久云一時勘破了也上堂云虗而靈寂而妙明密浩然猶落鑑照作麼生是不落鑑照直饒玄會得猶是眼中塵上堂云道得第一句不被拄杖子瞞識得拄杖子猶是途中事作麼生是到地頭一句上堂云處處覓不得只有一處不覓自得且道是那箇一處良久云賊心已露上堂云口邊白醭去始得入門通身紅爛去更須知有不出門底良久云喚甚麼作門法要示眾云撒手便行向甚麼處去不與萬法為侶見聞覺知路子已斷明密密佛眼也覰不見大休大歇祇是及得盡用得活見得徹明得透轉處純熟無毫髮計滲漏口頭更無佛法氣味命脈自斷光影俱透如萬仞懸崖放身廓忘依倚便能坐斷天下人舌頭機機隱密觸處混融一念萬年真常體露但行住坐臥參到藏身不得處垛避不及處便乃全身擔荷孤明歷歷無段無形萬象光中頭出頭沒更無欠少祗麼見成箇點靈然元無斷續恁麼覰得內內外外圓陀陀地養得爛骨堆地始得無過患然後一時掃却向乾坤那畔千聖萬聖望不及處去方知有向上事珍重示眾云參得快活用得自在便知有休歇底路子髑髏前鑑顧業識打得斷夢影銷落徹頂徹底明而無痕盡虗空大地一時脫落上下四維混混無把無捉坐斷佛祖言句不被天下老和尚熱瞞根底透漏絕消息盡却今時一味恁麼去忘蹤忘迹無方無所沒涯際絕畔岸揚眉瞬目千里萬里有甚麼開口處但隨分著此精彩風塵草動觸境遇緣盡底承當更無別法千變萬化自然打成一片常光現前任運不昧只箇一片常光亦須忘了喚作智不到處切忌道著道著即頭角生珍重示眾云命根斷底人驀然轉得來了日用全是本光逆順得失不見有一絲頭許出沒應機得大自在謂之隨順世緣無礙既能常不昧無閒斷一念通身恁麼去猶恐落在肯重未得十成更須轉取舊時光彩得到無辨處巧妙向背淨盡都忘方知不動步常在屋裏但忘教似枯木石頭牆壁瓦礫絕知絕解自然虗明歷歷無一絲毫特地費心力處珍重示眾云盡虗空大地甚麼處得來徹頂徹底元是箇一段光明彌滿洞耀不落意句亙塵沙劫歷恒沙界廓無變易若一念窮得源底明透直截擔荷便與三世諸佛齊肩猶落階級未為向上若掃却玄微階級智境法塵向未搖三寸已前澄想已俱盡照而無迹明而無痕混混密密千聖亦摸索不著只箇摸索不著亦非本有知落處底合作麼生珍重示眾云情境不透見覺不圓高低偏枯便有向背葢取捨揀擇過患未盡識相流注若一念混密淨盡承當任運現成不須管帶命脈自斷四大自脫明明歷歷照體廓然魔佛俱掃甚麼處更得迷悟生死一絲頭來出家兒灰念枯坐索性打教脫脫落落盡底劃斷將破皮袋殻漏子衣單下子細點撿不可開眼受瞞去也臘月三十日眼光落地紛然失路過在今時參究不徹示眾云坐得脫歇得到凝想俱盡絕根株明歷歷無可趣向也須是箇徹底放下死一遍了驀地甦息箇些精彩若明鏡臨臺絲毫不昧便恁麼橫身猶恐墮在絕點純清未透真常流注何況爭鋒競銳隨照失宗認識情著影響還出得陰界麼枯木生花始與他合是老人不識好惡底語捨不得者俱為滲漏直須淨盡灰歇參教穩密密地渾金璞玉去那一人尚未肯在示眾云但有言句都無實義千說萬說試為我拈一毛頭來看從朝至暮虗空裏喃喃地苦哉飽喫飯了開眼寐語阿你分上甚生次第混耀烜赫密露堂堂沒根株絕邊岸現成大用快活不徹外有甚大活計何不薦取只管依他作解認口頭聲色還知道記箇元字脚萬劫作野狐精麼快須忘前失後去家破人亡去路斷忘歸去垢盡明現去良久云不合恁麼道珍重示眾云喚作如如早是變了也百艸頭上不露面目直截向那畔移步轉身還更有撲不破底眼麼類不收混不去百般伎倆不成葢妙在體處若失些子光彩明露天地便為日用所留不能透塵墨劫前威音路外若是大徹大悟大闡提毀佛謗法不入眾數底漢咬釘咬鐵坐斷歷劫來路子靈然皎潔浩脈不通愈精愈明愈休愈歇混混沒蹤跡不變易無閒歇脫造化還有索性便恁麼去者麼珍重示眾云盡十方世界是一顆明珠鑊湯爐炭劒樹刀山發大悲光演微妙法若具無礙智眼歷歷不昧猶是驀路相逢未得穩坐透玄關出金鎖妙盡到家十成無辨猶有氣息在所以道有一人無出入息速道速道則曰不道為什麼不道則知不將來只箇不將來還有窮得根底明足為奇若也己見未明不知有向上事要搆古人也太不容易如今眼光落地如生龜脫殻似方木逗圓為形軀所留被風火所苦葢一生念念散亂心識紛飛臨終之時暫欲澄心靜慮閉眉合眼不為幻妄磨滅豈易得耶也須是硬鱍鱍壁立千仞一念恁麼去萬事俱忘去徹底剝了去氣息都無去那邊了却去直去使行如鳥道坐若虗空空想亦無箇點靈然明密密地任運卓爾恒無改變豈知有今時周由者也如石室在杏山踏碓擡起脚了忘却放下什麼處去來先聖則曰親近來又道擬親即疎擬近即遠要知此事大難大難如今還有明暗盡處光景落時不昧生死底麼良久云五蘊身全尚不知百骸散後何處覓示眾云平白地搆得徹底人直截向裏許擔荷放得停穩養得純熟坐却三寸舌頭明如百千日月便能截紋彩斷機絲一物不為萬緣冥應成現密密妙露堂堂只麼如今無能無伎倆若猛著精彩歷劫來路子只是當念不移易一絲毫照體虗凝迥絕依向古聖廓爾大悟了被人逼著語帶玄而無路心涉妙以難行則曰乘舟者迷登機者失當知尊貴不落意思沒量大黃面老兒尚只得一場懡㦬如今信彩開口還知無利益麼也須是性燥都忘了決定不流入第二念歷然明徹去方知不到衲僧口裏示眾云悟得紙衣下用只解恁麼去明得一色邊事未會先師意自餘隱峯倒卓灌溪駐步無業問隨後之人大顛說無聲三昧或聞鼯鼠而便脫或為愚癡而再來或竪指而休或飜船而往一一坐亡立化箇箇逞神現通其密也目擊正容其混也忘蹤失迹用得純熟撒手自由滿路光生迥無依著此雖衲僧平常轉身時節也未有一機絲落行珍重機緣師初見丹霞霞問作麼生是空劫已前自己師擬對霞云儞閙且去一日登鉢盂峯豁然契悟徑歸見丹霞方侍立霞劈耳便掌云將謂儞知有師忻然禮拜來日霞上堂云日照孤峯翠月臨溪水寒祖師玄妙訣莫向寸心安便下座師云今日陞座便瞞我不得也霞云儞試舉我今日陞座看師良久霞云將謂不瞥地師抽身便出霞一日在方丈後坐師問訊霞見來不顧師云維摩道箇什麼文殊便生讚嘆霞微笑師禮拜霞云儞不待我為儞說師云我又不是患聾師見石門和尚門問云終日勞勞成得什麼邊事師云須知有不勞勞者門云作麼生是不勞勞者師云要且不敢安名立字門云儞是識來不敢不識來不敢師云總不恁麼門云畢竟如何師良久門云正是勞勞者師拂袖便出師在南陽再見丹霞侍立次霞云儞為我淨髮得麼師便安排水於霞前而立霞云儞得恁麼純熟師云猶是奴兒婢子霞云那人在什麼處師不對霞云奴兒婢子師過香山菴中見師叔山問近離什麼處師云丹霞山云還見丹霞麼師良久云不離一步山云不虗參見丹霞師云也不得草草山云只如僧問思和尚佛法的的大意廬陵米價作麼生師珍重便行師見深州州問云甚麼處來師云丹霞來州云親見作家來師云且莫壓良為賤州拽拄杖師捉住云和尚尋常大小便利教什麼人勾當州便喝師云勘破了也師見保寧寧問云江河競注而不流豈不是遷中明不遷師拈火夾豎起云和尚喚者箇作什麼寧云老僧命根在子手裏師便放下火夾便行師到智海見佛鑑鑑見來駐步望師師近前方擬問訊鑑便歸方丈師隨後云且容轉身吐氣鑑回首師云不審便回師到法雲見佛照照從法堂出師云好箇阿師恁麼去也照顧師師便下法堂有僧云也須子細師云和尚尋常向儞道什麼僧云拈却山河大地明暗色空向什麼處安身立命師云儞且來我更問儞一轉公案僧隨師至三門師云夢見法雲麼師見雲蓋蓋問云女子出定話作麼生會師云合取皮袋蓋云不然我且入定儞試出看遂斂足而坐師和身推倒便出師見長蘆祖照照見來便問甚麼處僧師云川僧照云年多少師云二十六照云猶自亂走在師撼禪牀云只在者裏照便喝師便禮拜祖照一日同師到延壽堂照問病僧云儞作麼生僧云傷風頭疼照云傷左邊傷右邊僧無語師云者僧却安樂只是不肯參堂佛眼到長蘆師詣知客寮問訊眼見來於書案上拈起鏡子便照師云者野狐精眼放下鏡子師便出至晚澡浴眼自𢹂浴具到廚門前見師來眼云如何如何師云和尚莫要箇人隨後麼眼提起浴具復云已在者裏師揖云燒湯已辨眼便過師便行佛果到長蘆西方丈師相見了相並而坐果便舉廓侍者問德山公案以肘築師云因甚兩度不彩他師亦築云莫謗人好果大笑師云者賊佛果令僧馳書到師開見頌云宣化渡頭作別譬如兩鏡相照何止千里同風全提向上一竅師問僧作麼生是向上一竅僧擬分疎師云且莫辜負師復有頌答云運用堂堂本妙徹底不落鑑照一言及盡鋒鋩只箇更無孔竅師見超首座超舉參仰山偉和尚一日入室蜂子打窻偉云儞還捉得麼超云捉得偉云儞試捉看超以兩手佉偉頸叫云捉得也偉笑云儞只解騎虎頭超云要虎尾也不難放手禮拜師云仰山可惜痛棒放過了超視師良久師云者漢猶自弄精魂師問僧甚麼處來僧云天寧卓和尚處來師云向儞道什麼僧云舉雪峯道望州亭與你相見了也更來者裏作什麼師云天寧被你當面勘破僧云和尚也不得瞞人師竪拂子云你喚者箇作什麼僧云拂子師云却是你瞞我師問僧近離甚麼處僧云雲居師良久云見和尚麼僧云見陞座舉洗鉢盂話了呵呵大笑云此箇公案甚是穩密又呵呵大笑云此箇公案甚是穩密師云雲居為什麼脚跟不點地僧云什麼處是雲居脚跟不點地師云隨我舌頭走僧擬議師打云你夢見麼師問僧甚麼處來僧云佛果和尚處來師云室中向你道什麼僧云覿面相呈不得蹉過師云苦哉作者箇語話僧云未審和尚此間如何師云蹉過了也僧擬議師便打師問僧近離甚麼處僧云五祖師云五祖有何言句示眾僧云法堂上有一牌牌上有字云五祖有三轉語方來衲子道看師云我者裏一轉也無僧云問頭何來師喝云喫五祖多少飯也僧擬議師云草賊大敗師問新到甚麼處僧僧云祥雲菴主師云菴中事作麼生主云種田博飯喫師云喫多少辛苦作麼生主云若不恁麼爭到者裏師便休一日來辭乞頌師云前日公案未了畢竟菴中事作麼生主云舊時院主今要遷移師喝云什麼處去來遂與頌云相逢相揖眼如眉百鳥銜花尚未歸回首春風吹夢斷舊山雲散月明時師問僧枯木裏龍吟什麼人得聞僧云不墮凝然者師云猶有朕迹在僧云作麼生是絕朕迹底師云半夜不挑燈偈頌十首兀兀忘機巧灰來已得純虗明無間斷淨妙絕疎親密戶寒燈曉靈花古洞春回途賡雪韻門裏綠苔新湛寂凝然透孤明徹底空秋風生古韻曉月上寒松量外千差泯機前六用通應緣成底事畢竟不留蹤意句難分別風騷格外求提刀空四顧駐步失全牛落眼情塵脫歸根景象幽萬緣俱不到佛祖莫能酬徹澄無凝礙情塵迥脫然全機忘照外一句未分前枯木雲籠透寒潭月夜圓回頭開正眼芳艸破春烟只麼堆堆地常光密露時玄途明絕朕妙體廓忘依正去功中轉傍來曉路歸絲毫都及盡不覺口如眉絕點純清處由來是半提虗空休照鏡混沌莫糚眉隱隱忘兼帶寥寥罷曉機雪消寒谷暖花咲不萌枝不犯清波句澄江涵一鉤棹頭風色靜篷底夜明秋雁影沈寒水蘆花隱白牛須知耕釣外穩密類難收路斷無依著空船載月歸力窮忘一色功盡喪全機密混凝流處融通向背時古帆風靜夜任運應高低密密梭頭事機絲不掛時木鷄啼曉戶石女夜生兒已發寒灰焰難埋古塚荒郊春艸綠風暖共依依鳥道通身去迢迢劫外參隨流忘朕兆癡兀未曾閑瞬視成途轍揚眉落二三只應無見頂子夜白雲漫頌古師一日晚參大眾圍遶法堂定立片時師令侍者報云時寒各請歸堂大眾久而不散師遂出據坐片時大眾定立望師起身便歸方丈示頌云寒明一點墮空林朕兆依俙已觸今目擊正容成滲漏青天白日轉迷人有時示眾云盡大地是箇熱鐵丸下得口也通身紅爛下口不得也通身紅爛如何免得此過示頌云乾坤那畔類難齊千聖從來不識伊家破人忘迷肯重夜深寒塔影空垂有時問僧命根不斷不到牢關命根斷后向什麼處去僧無語示頌云萬緣歇盡照無時撒手忘依有路歸劫外一壺春色暖靈苗石上正芳菲僧問如何是空劫已前事師云白馬入蘆花示頌云線道難分處須知不是伊牛頭按尾上豈借大陽輝宣和癸卯宴坐自讚三十六年作怪撞入者箇皮袋一千七百衲僧被你熱瞞忒煞如今坐斷舌頭直下大千俱壞劫外迢迢曉未明休把虗空糚五彩崇先真歇了禪師塔銘夫道詣於大同性成乎圓通無住而住不空而空東西三十三傳默合符節信不私而公也佛吞三世經破微塵發自己之光明得衲僧之機用根境平出行履自然天地之默成陰陽之化光四時之氣備萬彚之慈等祖龕燈活緇園律溫持法柄荷佛擔力抗魔外身任艱難悟空禪師其人也師諱清了道號真歇姓雍左綿安昌人兒時抱持入寺見佛喜動眉目人咸異之十一歲依聖果寺清俊出家業法華經更七年榮試得度具戒已之成都大慈寺聆圓覺金剛起信等經論之講領略大意便登峨嵋禮普賢大士東行出蜀道過瀘南郡建崇寧寺遮留之師曰鯤鵬時節詎草草耶下瞿塘轉灔澦出荊楚歷沔漢投鄧之丹霞山淳禪師之席一日入室霞問如何是空劫以前自己師擬進語霞與一掌師豁然開悟翌日霞示妙密詰其證詣猶珠之影隨谷之響答也北遊五臺禮文殊大士已而至京師禪講名席俱扣摭焉浮𪵩而下時祖照禪師住儀真長蘆龍象之眾蹴踏萬指師投其中英俊相親駸駸殆半延為侍者踰年而罷以轉物寮待之舉分座入室師默遁去祖照以偈招之復回秉拂叢林老成趨門折節命為首座政和八年祖照退院夜夢人告曰蜀僧當代公既寤疑曰佛果耶佛眼耶未幾再請主之宣和三年祖照病復命師為第一座病甚退院四年秋七月經制使陳公請師補處五年夏至居雲堂千七百僧五月開堂嗣法淳和尚六月江風駕潮漫田殆無穫矣師陞堂告眾安坐勿憂八月祖照遷化師行喪以師禮十月躬行乞食六年二月告還撾鼓出所得供須有羨問津指源燭幽汲深踰七載建炎二年六月退院八月絕錢塘如明之梅岑禮觀音大士海山七百餘家一聞教音俱棄漁業計日活千萬億命四年過我結制五月天台國清寺三請三辭八月為鴈蕩之遊十月客天封寺受福唐雪峯請十一月入院雲水之儔復過長蘆之數檀信趨施歲用舒裕閩中佛剎自古禪居深林遠壑樓觀相望主盟之人悉舉江湖有道尊宿一洗故習紹興五年退居東菴六年七月四明阿育王山廣利席虗奉旨請師寺之曠敗未易料理齋鼓不伐晝突不黔逋負幾二十萬人悉為憂師十月入寺井邑林壄喜聞師來遠親近鄰扶老𢹂幼肩踵相摩舳艫相銜師入席始溫償逋十之八九七年駐驆建康詔師住蔣山且行且辭疾七上乃允八年溫之龍翔興慶二院合額禪居詔師主之四月入院陞堂小參安集來眾東西兩址潮漲限之築堤坑護南北隆衍建三門大殿法堂方丈翼以故屋金糓竹木循乞得之一寺雙塔玉巧幻出屹然江上繪圖以進賜田千畞法食厭滿乃專佛祖職事十五年二月乞就閒四月詔師住臨安徑山五月入院僧踰千鉢常住素薄行丐以供二十年二月以疾乞歸長蘆二十一年勑建崇先顯孝禪院成詔師主席六月入院暑行疾作九月壬子慈寧太后詣寺師力疾開堂垂箔聽法問答提唱一席光耀賜金襴袈裟銀絹等物癸亥疾弗瘳甲子宣醫乃少間慈寧宮賜錢修建水陸法會丁卯十月朔旦中使候問從容而別須臾呼首座曰吾今行矣瞑目跏趺而逝龕留八夕慈寧宮降香賜幣以侑齋祭卜院西桃花塢建塔以瘞全身越壬午入塔送龕之人彌滿原野痛心隕涕皆有祖華凋零禪林寒瘁之歎二十三年八月勑諡悟空禪師靜照之塔師儀相頎長初癯後腴眉目疎秀神宇靜深舉動超遙雲行鶴立影響觸受鑑淨谷虗其量容機活警敏用神律身以嚴不苟於行己格言而簡不倦于誨人定慧圓明道德昭著一時賢士大夫樂與之遊諸方名德尊宿難侔其盛林儔社友川趨海受投爐鎚就刀尺方圓長短隨其宜也善人信士雲委山積望威儀聽教誨見聞薰習廣其勤也以如幻三昧遊戲世間行平等慈得自然智導無前而遜無後有無外而空無中祖域之英標僧林之傑出嚴冬之日破夜之月洗寒之春濯熱之秋其慰人心也如此師為僧四十五夏出世三十年六處度弟子普嵩等四百人嗣法出世者曰慧悟住真州長蘆曰宗珏住明州雪竇曰傳卿住建康府移忠報慈曰得明住臨安府崇先顯孝總三十餘人語錄兩集行於世噫度世之因緣起家之事業光輝始卒照應古今姑得而敘之其於名象之先踏身世之表幾微剪拂心得神傳又烏可寄毫素而摸寫哉銘曰佛祖之燈東西繩繩以悟為則惟證相應心華自發覺海元澄蹴踏龍象變化鯤鵬雪庭之可舂屋之能無絲繫螘無糝聚蠅菩提印印般若乘乘月排夜色山拭秋稜宗傳曹洞濬深凝重敲唱双行正偏互用豹變霧披龍驤雷送的的無依功功不共元牝象成靜樞機動暗擲金梭明窺錦縫法法本然門門變弄影悟蛇疑物齊蝶夢道詣而唱心聞而賞方回萬夫香酬一掌丹山羽成沂川波漲鯨展潮翻兔推月上葦江東趨雪峰南仰玉線金鍼鰲鉤鳳網妙觸根塵冲虗影響風雨五湖烟蓑一槳理之所歸水之趨低輸心援引出手提𢹂石虎風嘯木鷄夜啼混之不得類之不齊七據緇海正承紫泥孤嶼月棹双徑雲梯門連少室路接曹溪花滋釀蜜桂魄通犀慈遊普門三昧塵塵象王之步獅子之顰母陀羅臂舜若多身星圖魁斗花氣陽春微言以示淵默而神正因非字絕學為鄰步轉空劫舟膠要津真燈不夜嗣光有人紹興二十六年四月夏安居日住明州天童山景德禪寺法弟比丘正覺撰附錄華藏無盡燈記出禪門諸祖偈集東平打破鏡已三百餘年龍潭吹滅燈復四百餘歲後代子孫迷於正眼以謂鏡破燈滅而不知行住坐臥放大光明燈未甞滅也見聞覺知虗臨萬像鏡未甞破也燈雖無影能照生死長夜鏡雖無臺能辨生死魔惑鏡與燈光光常寂明與鑑幻幻皆如照之無窮則曰無盡燈鑑之無窮則曰無盡鑑日用不昧昭昭於心目之間但眾生迷而不知故有修多羅教開如幻方便設如幻道場度如幻眾生作如幻佛事譬東南西北上下四維中點一燈外安十鏡以十鏡喻十法界將一燈況一真心一真心則理不可分十法界則事有萬狀然則理外無事鏡外無燈雖鏡鏡中有無盡燈惟一燈也事事中有無盡理惟一理也以一理能成差別事故則事事無礙由一燈全照差別鏡故則鏡鏡交參一鏡不動而能變能容能攝能入一事不壞而即彼即此即一即多主伴融通事事無盡悲夫眾生居一切塵中而不知皆毗盧遮那無盡剎海普賢示一毛孔而不知一一毛孔中含眾生三昧色身然一切眾生日用在普賢毛孔中毗盧光明內慈氏樓閣中出沒文殊劒刃上往來念念中與諸佛同出世證菩提轉法輪入滅度如鏡與鏡如燈與燈方一切一時溥融無礙誠謂不可思議解脫法門非大心眾生無以臻于此鏡或曰即今日用見聞覺知畢竟是燈耶非燈耶是鏡耶非鏡耶偈曰鏡燈燈鏡本無差大地山河眼裏花黃葉飄飄滿庭際一聲砧杵落誰家戒殺文出歸元直指堪歎世人大錯却將苦事為樂迎賓待客安排殺害生靈造作耳畔痛聲未絕便把沸湯淋淥不是鑊裏烹炮便向火中炙烙堂上聚集親朋堂下喧喧鼓樂恣其一世奢華豈覺千生墮落一朝壽盡報終奪命冤家尋捉直饒抵諱分舒其奈鬼神執縛或上刀山劒樹或入𦦨爐沸鑊依次償他宿債却被刀傷斧斫此時痛苦自當人情却使不著縱然受苦出期未免透入別殻若非啣鐵負鞍必定披毛戴角奉勸諸善男女各自回頭相度何如改悔身心庶免沈淪三惡若教賺却路頭萬劫難為轉脚但念阿彌陀佛求生西方極樂淨土宗要出蓮宗寶鑒彌陀不離眾生心是三無別極樂徧在一切處舉一全收如帝釋殿上千珠寶網千珠光影咸入一珠一珠光影徧入千珠雖珠珠互徧此珠不可為彼珠彼珠不可為此珠參而不雜離而不分一一徧彰亦無方所彌陀淨土即千珠之一十萬佛國一佛國土各千珠之一聖人善巧方便示人專念阿彌陀佛乃千珠直指一珠見一佛即見十方佛亦見九界眾生微塵剎海十際古今頓圓了無餘法矣自贊出大智拈古鈔信口胡說七差八錯萬劫千生不妨快活情願生死輪回肎求諸聖解脫誰言遍界沒遮欄雨過青山雲一抹真歇了禪師出正宗贊師諱清了左緜人俗姓雍初見丹霞悟旨後謁長蘆照照一見器之命為侍者踰年分座未幾照稱疾退閑命師繼席學者如歸拈香時照付衣與師望拈出及見為霞照令左右扯去衣師預備布伽梨於袖遂搭示眾撼拄杖云看看三千大千世界一切動搖雲門大師即得雪峰門下即不然卓柱杖云三千大千世界向什麼處去還會麼不得黃梅雨秧苗爭得青竹菴珪禪師紹興間奉詔開山雁湯能仁時真歇居江心聞師至恐緣法未熟特過江迎歸方丈大展九拜以誘溫人由是翕然歸敬出續傳燈船子夾山話出頌古聯珠離鉤三寸如何道駐擬還同眼裏沙篷底月明載歸去劫前風韻落誰家惠超問佛同前問佛分明答惠超半斤八兩不相饒叢林萬古為殃禍惡語傷人恨不消
