front:
  text: 較正重刻劫外錄引伏惟真歇祖之劫外錄曾播支那也當時有通玄淨禪師者造此錄判辨事載空谷集又采熱鐵丸語載佛法大明錄及俗書韻瑞等以稱了和尚劫外錄則可謂熾也日本寬永中所刊之本文字寫誤非但數十末載塔銘亦脫其序余悶之尚矣今秋有緣寓惠日之艮嶽院偶得古寫本於蠧𠕋堆讀之巨備焉是故重刊流布謹考塔銘之序則謂語錄兩集行於世也必定有廣錄在若有之則可與宏智廣錄分鑣竝馳嗚呼不傳于日本也遠孫之遺憾也今采輯散逸以附者崑山之片玉而不忍棄也且如昔編此劫外錄亦略上之略而所謂千百之十一乎然而比之於他之百帙千套則不異孤月之在于眾星光明徧照有何邊際伏冀遠裔之麟角鳳毛稱提之以扇揚祖風則不負祖恩之須彌山高兮大兮遺蔭之娑竭海深兮廣兮云爾明和丁亥孟春初五第三十三世遠孫八十五翁方面山盥董拜題於洛東瑞龍山之金龍軒真州長蘆了禪師劫外錄序長蘆了禪師芙蓉之孫丹霞之子得法於鉢盂峯上以無所得而得說法於一葦江邊以無所說而說雲行水止從而問法者常千七百人以無所聞而聞予甞造其室窅然空然溫伯雪子之忘言淨名居士之杜口予莫能知且觀其抱美玉於空山混銀河之秋月視之不見言之莫及時時顧堂上之簾深憐戶外之履滿於是萬金良藥湔腸易骨斯須之閒病者起走人人輕安得未甞病亦如雷雨既作草木萌動頃刻霽止了無痕迹天清物春雨已無用雖然豈直如是而已哉木鷄啼霜石虎嘯雲鳥鳴山幽蟬噪林寂世有望角知牛聞嘶知馬者其庶幾歷其藩乎紹興二十八年正月旦中橋居士吳敏序
