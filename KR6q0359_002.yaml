body:
  text: 示衆云截斷千差岐路已是平地喫交併却咽喉唇吻未免扶籬摸壁若更開蝦蟆口說心說性說禪說道盡是誑唬諸人滅胡種族從上來事合作麼生不涉廉纖試請舉看舉信心銘拈云這野狐精喚作什麼說話不是心不是佛不是物信箇什麼淨裸裸赤灑灑勿可把更銘箇什麼三祖大師不識好惡道箇心字已是錯下名言污却口了也直饒漱口三千年洗耳八萬劫已是藤蛇繞足露布纏身那堪更成群作隊來這裏要人說破且喜沒交涉雖然如是舉一不得舉二放過一著有箇商量處試問諸人現今四大六根內外虗幻徹底空寂面前明明了了彌滿天地復是何物恁麼信得去便是自己本地風光本來面目晝夜放光動地常在面前出入若也思量擬議佇思停機且向禪牀角頭伏聽處分至道無難唯嫌揀擇拈云住住才有語言是揀擇是明白三祖大師平生心肝五臟一提提起呈似諸人了也還搆得麼只這至道無難言端語端非但趙州五年分疏不下直得天下老和尚倒戈卸甲向這裏納敗闕如今欲得透頂透底徹骨徹髓地參透這一轉公案麼但剝去從前依草附木千種萬般伎倆計較知見解會露布葛藤一時吐却向自己命脉上試點撿看若一得便請高掛鉢囊拗折主丈許你是箇無為無事底間道人若也意根未斷見解不忘向開口處卜度漿水錢草鞋錢大責還人在寂菴憑麼告報也有三十棒過在什麼處父母所生口終不為子說但莫憎愛洞然明白拈云是誰恁麼道良久云無人識得渠雖然如是不求諸聖不重己靈憎箇什麼愛箇什麼而今一般底將依師語相似語格則語合頭語口傳心授印板上次第排布參來參去參得一肚皮禪三年兩歲依前忘却到處爭勝負彼此人我無明亘天作麼生得無憎愛去諸人者要會洞然明白麼竪起拂子云慚惶殺人毫𨤲有差天地懸隔拈云不妨道著只是不知落處大小大法眼修山主尚似依本畫葫蘆何況你如今也隨例舉一遍便當此事禪和子須是悟始得有者道差之毫𨤲失之千里此是無心境界擬心即差動念即乖若恁麼注解將去只羸得一場口滑三祖大師肚裏無許多事只是覿面相呈兩手分付只如毫𨤲有差天地懸隔你畢竟道落在什麼處僧擬開口師便打欲得現前莫存順逆拈云道什麼良久云一時著了也一隊漢更諱不得現前是什麼堆山積嶽與我拈得一絲毫來豈不見溈山二十年不參禪不學道只是養得一頭水牯牛常在目前露裸裸地若得憑麼逆也不見順也不見頭頭物物一時坐斷喚作常光現前念念不昧若只單明自己不了目前此人亦只具一隻眼若只單了目前不明自己此人亦只具一隻眼諸人者如何相應去大地雪漫漫冬來依舊寒違順相爭是為心病拈云如今恁麼者多不恁麼者少成羣作隊如麻如粟沒量大人總作這箇見解不是憎便是愛不知憎愛是心違順是我你自虗妄顛倒自憎自愛自違自順互相毀謗各黨宗風說是說非誇玄誇妙這箇總是執法總是執心病參禪只要安樂你肚裏有許多病痛如何救得別人禪和子明明向你道或是或非人不識逆行順行天莫測還會麼莫將間學解埋沒祖師心不識玄旨徒勞念靜拈云機幾乎坐殺這漢只管無繩自縛作什麼者箇是大解脫門自在三昧步步活機機活圓轉無窮閙浩浩處識得方始八面玲瓏七穿八穴你却向黑山下死郎當地有什麼交涉饒你得到精明湛不搖處猶未去它識陰在此是靜想不脫己見不明一向坐在無事界中喚作打淨潔毬子殊不知勞慮永斷得法界淨即彼淨解為自障疑此乃得在於神靜失在於物虗錯認定盤星只管喚作無心境界且喜沒交涉正是業識茫茫外道見解西天九十六種最下一種也須勝你諸人者要會玄旨麼良久云只有照壁月更無吹葉風圓同大虗無缺無餘拈云即此物非它物無眹迹沒涯岸如羚羊掛角似鳥道虗玄五色不能染五音不能亂萬象不能雜森羅不能參圓陀陀孤逈逈圓滿無際在凡夫喚作凡夫法在聖人喚作聖人法本無缺少無餘剩在什麼處勘破了也良由取捨所以不如拈云錯又云本無缺少取箇什麼本無餘剩捨箇什麼既是圓同大虗在在皆有不可更取在在皆無不可更捨古人也向你道前面明歷歷地沒形影者便是你一心之法你現今將法聽法以心覔心底現成了也你更嫌箇什麼一般底參不透便道我今生不會捨却此事隨分看經持課且恁麼過日殊不知坐臥經行大小便利常隨你後看經持課禮拜燒香常隨你後作麼生捨直是取不得捨不得不可得中只麼得要見祖師麼應須恁麼會方始契如如示衆云斬釘截䥫門前草深一丈破二作三平地上死人無數而今提起殺活杖子向百草頭上七穿八穴倒用橫拈衆手淘金誰是得者莫逐有緣勿住空忍拈云瞎漢向什麼處去誰教你墮坑落塹你識得有緣麼者箇是你無量劫來生死業根顛倒識性如今昏昏地打入髑髏中皮袋裡晝夜攀緣不曾休歇你既識不破一向逐它貪愛取捨造業受報向輪回生死海裡頭出頭沒你如今要不逐有緣麼須是截斷意根淨裸裸地眼前萬境一時休歇自然有箇安樂處一般底聞著人說又一向背六塵境撥去萬象心住空寂坐空劫中守枯木岩前孤危死底喚作休歇處且喜沒交涉殊不知機不離位墮在毒海直饒八萬劫大定只是箇魂不散底死人落空亡外道豈不見同安道迢迢空劫不能收豈與塵機作繫留須是塵勞不染淨妙不收有緣空忍二俱透脫方知有向上事汝且作麼生是向上事暗裏抽橫骨明中坐舌頭一種平懷泯然自盡拈云皮膚脫落盡唯有一真實輝古騰今明如杲日現今面前赤灑灑地還見麼喚作平常心返常合道無汝計較處橫參竪參到佛祖道不得處如狸奴白牯李四張三空有二邊泯然自盡到得恁麼田地眼如眉毛口似鼻孔方解穩坐諸人者如何得相應去良久云羌笛數聲踈雨後冒烟吹過夕陽村止動歸止止更彌動拈云話成兩橛汝只管業識茫茫迷頭認影作什麼動是何物靜是什麼物不可有兩箇此事唯一無二你要止其動歸其靜即沒交涉殊不知行住坐臥見聞覺知語默動靜當體即真無形無相無眹無迹此則動無動相全體是止止即靜也雖然無形無相無眹無迹明明歷歷常在見聞覺知語默動用處光爍爍地纖毫不昧此則靜全是動也汝如今要止其動用一向歸其靜處殊不知靜轉動也禪和子靜即是動你止它作什麼是以聖人空洞𮌎懷無識無知雖居動用之中常處無為之境只如不涉動靜一句作麼生道拍禪床云百雜碎唯滯兩邊寧知一種師打云只為赤肉團要抵我棒不識痛癢死在棒下只管著動著靜迷己逐物被世間有相無相根塵流浪將去到幾時知有此事要會麼僧擬議師云打得百千萬箇堪作什麼一種不通兩處失功拈云果然扶籬摸壁腳忙手亂動全靜靜全動唯一無二汝這癡鈍漢既打不透向動處作工夫又認賊為子向靜處作工夫又斬頭覔活只管墮坑落塹一不成二不是見解偏枯情境滲漏莫道兩處失功直是頭頭蹉過你若一處透千處萬處一時透且道是那箇一處良久云路上有花兼有酒一程分作兩程行遣有沒有從空背空拈云有什麼救處且問你有什麼物從你遣試與我拈一絲毫來看盡乾坤大地都盧是箇主人公只是箇衲僧受用家事喚作妙用喚作妙有你作麼生遣你若撥萬象去塵境遣却萬有即迷妙有落在斷見禪和子但子細思量看你既撥萬象去塵境墮在空劫中又却背其真空而不知萬法當鉢即是真空觸物本來無相橫拈倒用有什麼忌諱大都不明心地遣萬有即迷妙有從斷空即背真空但止其動便是遣有要歸其靜便是從空此中說有說空前來說動說止動即是止有即是空名異體同更無它法且道過在什麼處貪觀天上月失却手中珠多言多慮轉不相應拈云且低聲你才開口便沒交涉了也須是拈起無孔䥫鎚直教盡大地人喪身失命若不恁麼打在葛藤窠裏如跛鱉盲龜入空谷相似幾時得出去禪和子此事若在言句中一大藏教豈是無言何必拈花微笑傳正法眼藏你要會麼合取皮袋直下搆取更莫思前算後擬議思量便打入鬼窟裡去所以情生智隔想變體殊要須語路處絶心行處滅畢竟成得什麼邊事一夜落花雨滿城流水香絶言絶慮無處不通拈云什麼處得者消息來良久云寧可截舌不犯國諱復云萬機頓削千聖不携視自己尤若冤家以佛祖便為弟子德山臨濟有棒有喝開口瞪眼到這裡都使不著雖然如是莫守寒岩異草青坐看白雲宗不妙歸根得旨隨照失宗拈云便恁麼去直得三世諸佛六代祖師天下老和尚口似匾檐已是落七落八何況明宗旨𮗿得失論根本說照用幾時得休歇去禪和子你如今擬開口要話會墮在言句便是究妙失宗機昧終始喚作語滲漏喚作隨照失宗只被口頭聲色見聞知解流轉將去只如古人道葉落歸根來時無口又作麼生說須彌頂上無根樹不犯春風花自開須臾返照勝却前空拈云你待翻欵那前來道遣有沒有從空背空如今却道須臾返照勝却前空將謂你這漢不瞥地前頭不了萬法全真遣有沒有如今會一切色法當體即真更不遣有既會萬法為自己無一法可當情照徹千差直下便是須臾之頃返色歸真更不離而觀空即當體而無相喚作見色便見心所以勝却前空參到這箇田地關棙子一轉日用之間阿轆轆地更無回避處直饒恁麼已是自埋前空轉變皆由妄見拈云自知即得前來只管背境觀空去生滅念澄湛身心絲毫不見唯覺上下四維空空地將謂奇特殊不知是你心想所現若離想心此空還滅此則識心雖不著有轉變著空空想當情亦是妄現所以莾莾蕩蕩撥無因果棄有著空避溺投火子細思量一狀領過不用求真唯須息見拈云現成公案你求它作麼見聞也真聲色也真動靜也真語默也真即今日用見聞覺知純真直得亘大劫滿天地填溝塞壑千差萬化全躰一真不動纖毫一時成現更無缺少應你有見空見佛見法見一切見解淨淨掃却這裏淨裸裸赤灑灑自然到穩密田地忽然釋迦老子道吾不見時何不見吾不見之處又作麼生良久云是何心行二見不住慎勿追尋拈云猶掛唇吻在這裏要你有見空見一時打脫作箇大無事人更莫追念更不尋求轉踈轉親轉近轉遠轉轉棄捨轉轉隨後來直得灰頭土面一念玄去更不受食已隨在尊貴了也如何得不墮尊貴處一片月生海幾家人上樓才有是非紛然失心師和聲打復云什麼處去也良久云芳草渡頭尋不見夜來依舊宿蘆花示衆云高高峯頂立橫穿竪穿天下衲僧髑髏坐斷主人翁千人萬人羅籠不住如今案牛頭喫草氈上挹猫兒若也騎虎頭二俱成瞎漢還有不受殘羮餿飯底麼二由一有一亦莫守拈云你共誰說還會麼一切空有一切動靜一切得失一切取捨一切憎愛一切是非都盧只是主人翁無二無別古人不得已喚作一大事因緣一路涅槃門一乘方便法一言盡十方一句超萬象千句萬句只是一句千法萬法只是一法得到一處亦須轉却若也守住其一便是繫驢橛所以雲門大師道直得乾坤大地無纖毫過患猶是轉句不見一色始是半提更須知有全提時節禪和子不妨誵訛你要會麼須向萬仞崖前打箇筋斗直下命根斷去方得少分相應一心不生萬法無咎師良久云山是山水是水天是天地是地有什麼過著衣喫飯掃地煎茶東游西玩大小便利有什麼過但除其病不除其法不改舊時人只改舊時行履處作麼生是即今行履處掬水月在手弄花香滿衣無咎無法不生不心拈云一串穿却一提提起八面玲瓏峭措無賽直得三祖大師無隱身之地諸人者還知落處麼最好是一條界破青山色能隨境滅境逐能沈拈云光境俱忘復是何物還知麼能照是心所照是境境因心起心因境生心無念而境空境無相而心寂故得能隨境滅境逐能沈理智冥符人牛不見直得桃花零落盡何處見靈雲境由能境能由境能拈云因誰致得心全是境則境由能境境全是心則能由境能能由境能則奪境不奪人境由能境則奪人不奪境所以在境全境則不奪山青水碧天高地厚七縱八橫千變萬化在心全心則乾坤大地百雜碎欲知兩段元是一空師連聲打云說什麼兩段三段只要喫棒我要與祖師相見你莫道人境俱奪聖凡坐斷亦無人亦無佛大千沙界海中漚一切聖賢如電拂饒你道得十成未免喫棒一空同兩齊含萬象拈云有利無利不離行市恁麼不恁麼㹅在裏許無相而相無形而形無為而為無作而作同能同所同境同心照用齊行人境俱不奪雖然如此主丈子吞却乾坤了也山河大地甚處得來劫火洞然毫末盡青山依舊白雲中不見精粗寧有偏黨拈云人平不語水平不流主丈子平時如何直饒攪酥酪醍醐為一味鎔瓶盤叉釧作一金天地同根萬物一躰無黨無偏無精無粗也未為奇特諸人者作麼生是奇特事山花開似錦澗水湛如藍示衆云奔流渡刃啐同時石火電光殺活自在直得雞寒上樹鴨寒下水已是喪身失命還有不顧生死底麼試請出來葛藤窠裏看大道躰寬無易無難拈云土曠人稀相逢者少良久云可煞寬大十方虗空生其中猶如片雲點大清裡欲識大道真躰麼志公云不離聲色言語你如今箇箇能言解語見色聞聲大道真躰在什麼處豈不見僧問趙州如何是道州云墻外底僧云不問這箇道州云你問什麼道僧云大道州云大道透長安趙州老人言語太直三祖大師開口見膽志公和尚舌頭無骨來說是非者便是是非人三箇草賊一時捉敗作麼生斷遣本州牢城小見狐疑轉急轉遲拈云自領出去又云阿誰教你著忙向你道直下無事滿肚是疑不肯退步承當只管向前勞形苦神急要成辦殊不知轉急轉遲轉轉用心轉轉勿交涉直饒練磨經三無數大劫只成得有為功行不知一念無心便超三乘權學不見趙州道我見百千萬人盡是覔作佛漢子於中求無心底人難得禪和子如何得不疑去良久云天共白雲曉水和明月流執之失度必入邪路拈云瞎漢放下著此事如大火聚擬之即死有什麼窠臼途轍依倚趣向你而今有依倚途轍窠臼趣向己見不亡耽著其事爭人我覔勝負鼻孔遼天不肯天下人盡是邪見被些子禪道使得沒奈何揑搦做一團在這裡如何得不入邪路去年梅今歲柳顏色馨香只依舊放之自然體無去住拈云放箇什麼須是明眼人始得這裏禪道佛法奇特玄妙一點也用不著只是打睡隨分普請擇菜喫茶說話且恁麼過時天下老和尚拈槌竪拂盡是作夢說禪說道總是寐語你道據什麼道理有道理堪作什麼任性合道逍遙絶惱拈云大無事境界須是大無事人方能荷擔古人養來養去純純地如嬰兒相似東西不辨南北不分六根門頭一時休歇自然虗明自照了了地無諸分別念想任性隨緣佛法世法不相惱亂根塵四大動靜語默一齊卸却更無絲毫繫絆終日只守虗間間地且道成得什麼邊事良久云到頭霜夜月任運落前溪繫念乖真昏沈不好拈云瞎睡漢而今髑髏中皮袋裡昏昏地念念流注念念現前作麼生得不乖天真之道喚作飲無明酒醉在聲色煩惱窟中昏昏沈沈地臥大法身於生死長夜到幾時得醒悟去直到驢年也未夢見在不好勞神何用疏親拈云迷頭認影作什麼擬心即差何況有疏親有揀擇顛倒知見取捨解會心路搜求意根揑搦有什麼交涉此事只要妄情體證向用心不得處冥加觀察何必勞心神苦思慮終日昏昏地饒你參到彌勒下生只是參得一肚妄想莫怪相賺只恐不是古人道擬將心意學玄宗大似西行却向東欲趣一乘勿惡六塵拈云嫌箇什麼十方佛土中唯有一乘法何處得六塵境來你試與我拈一絲毫來看內身外境虗空大地咸是妙明真心中所現之物塵塵爾念念爾無有一法定有自躰什麼處得見聞聲色來但能外遣世界內脫身心直下照了圓融無際自然得大解脫諸人者要見祖師麼山虗風落石樓靜月侵門示衆云道無定亂法離見知言句相投都無實儀從上諸聖心如白月口似醉人以無味之談塞斷人口握金剛寶劍截斷葛藤句句論當機要人覿面搆取還有信得及底麼六塵不惡還同正覺拈云一言道盡裂破古今外不見山河大地內不見四大五蘊色不是色聲不是聲聞不是聞見不是見竪拂子云還見這箇麼雪竇道主丈子是塵有什麼過過既無應合辨主所以糞掃堆頭丈六金身拈放一邊赤肉團上壁立千仞放過一著直饒四方八面正好連架打遂擲下拂子云我也不可盲枷瞎棒去也智者無為愚人自縛拈云一狀領過又云也不得草草色香味觸外六塵境本無自躰盡是衲僧轉身處證明處成道處明眼漢終日綿密受用無漏無為有什麼過未知有者心外見法被見聞聲色眼前萬境一時縛住而不知萬法本無唯人自閙禪和子你但見凡見聖見女見男盡是染污心中虗妄顛倒據實而論無一絲毫計為對為緣自是你無事生事髑髏前自家見鬼引得許多事如蠶作繭自纏自縛不見四祖問三祖求解脫法門祖云誰縛汝禪和子作麼生會他道誰縛汝良久云領取鈎頭意莫認定盤星法無異法妄自愛著拈云爭怪得別人你而今從生至死只是這箇千法萬法只是一法更有什麼異來你只管愛這箇嫌那箇著這箇棄那箇既有愛著即取一邊徒增夢境以自性淘自性轉失真原盡是自家虗妄顛倒禪和子作麼生會它法無異法良久云一言盡十方絲毫未舉揚將心用心豈非大錯拈云爭怪得別人你四大解聽得法麼既是赤肉團不解聽法聽法者復是何物現今以法聽法將心覔心將禪覔禪擔一擔佛法更來這裏覔人說佛法豈不是大錯怕你道不著還識羞麼騎一頭牛却來問人牛在什麼處莫辜負人好迷生寂亂悟無好惡拈云說迷說悟有什麼了期只這箇是人人分上有此一段空寂之躰徹上徹下明皎皎地無定亂離見知超凡聖越情量若一念迷情忽背此空寂之體即被散亂心想一時隔礙不能現前若一念不生前後際斷悟此空寂之體裏許喚作實際理地不受一塵更有什麼好之與惡只如不涉迷悟又作麼生常憶江南三月裏鷓鴣啼處百花香一切二邊妄自斟酌拈云誰教你亂走而今說聖說凡說迷說悟說好說惡說有說無說定說亂說心說境說得說失說是說非但是對待之法皆是二邊若將此二邊卜度胡亂斟酌盡是戲亂箇般若擬心已沒交涉何況更在開口處但有言句都無實義還知麼巨鼇不在江湖裏堪笑時人把釣竿夢幻空華何勞把捉拈云放下著無一絲毫事你生許多計較作什麼一切萬境是夢一切萬象作幻一切萬法是空花無纖毫可得只為你業識茫茫妄執四大肉團上臭骨頭死髑髏為我自身引得許多勞攘終日逐眼前萬境只管作夢流轉將去禪和子如何得醒醒去良久云青天白日得失是非一時放却拈云放到那裏若有一物便教你放下既如夢幻空花又作麼生禪和子而今要你放下得失是非直是費力須是悟一悟也不消你放下自然知是一場夢幻大都心若無事萬法一如你若心頭勞癢是是非非得得失失在眼前又作麼生會它道一時放却底道理良久云但得雪消去自然春到來示衆云把定乾坤眼綿綿不漏絲毫離見起情純清絶點擬議即差開口即墮瞬目揚眉白雲萬里到這裏你作麼生轉身吐氣眼若不睡諸夢自除拈云寐語作什麼三世諸佛說夢六代祖師說夢天下老和尚說夢揚眉瞬目拈槌竪拂盡是說夢且道因誰致得只為一切衆生無始劫來臥大法身於生死長夜夢受六道輪回生死譬如世人睡眠困重五根五動第六意識虗妄偏許種種夢境此境實無但是識變正當夢時不可為無及其醒悟心境消落空無所有所以道夢裡明明有六趣覺後空空無大千當知覺乃是夢若眼開不睡則無夢境若心不起則無生死六趣輪回皆由心作三祖大師恁麼說寂菴恁麼說諸人與麼聽且道是夢是覺喝云惺惺著心若不異萬法一如拈云一時道了也還會麼直得動靜一如語默一如見聞一如迷悟一如聖凡一如衆緣萬境全體一真更無心外法亦無法外心應須恁麼會方始契如如諸人者眼睡則有夢境心著便是輪回眼不睡則夢境自除心不異則諸緣空寂本來既無一物花柳一任青紅燕語鶯吟盡是道人活計然雖如是大似春意在景噫一如體玄兀爾忘緣拈云合取皮袋良久云直是裩無襠袴無口頭上青灰三五斗也未夢見在饒你東西不辨南北不分眼似眉毛口如鼻孔養得如嬰兒純純地也未夢見在還會麼風定花猶落鳥啼山更幽萬法齊觀歸復自然拈云了了見無一物天地一指萬物一馬懷六合於胸中而靈鑑有餘鑑萬象於方寸而其神常虗不動纖毫一時成現孤明獨照歷劫坦然返本還源歸根復命到這裏方合自然天真之道若能如是是真出家泯其所以不可方比拈云若更開口堪作什麼所以道萬象既泯全體露現正當恁麼時說似一物即不中喚作一物即不可類不齊不稱斷混不得亘古今如人飲水冷暖自知不可說示於人諸人者要會麼鷺鷀立雪非同色明月蘆花不似它止動無動動止無止拈云這箇些子如大火聚擬之即死你作麼生卜度要會麼止即是動且靜時全靜是動所以動無動相動時全動是靜所以靜無靜相你而今動用見聞所作所為千差萬別是箇什麼若得見當體無形狀無眹迹便是動無動相雖無形狀無眹迹又却常在動用中撑天拄地此則靜無靜相若言其動狀似䥫牛之機若言其靜應物現形不可以動靜言說二邊卜度是以從上古佛掩室扗詞不敢喘息若喘息之間白雲萬里兩既不成一何有爾師云拈却了也動靜是二也勿交涉動靜是一也勿交涉修山主道二破不成一一法鎮長存若人一一會永劫受沈淪須知此事絶戲論無你下口處淨裸裸赤灑灑地赤肉團上壁立千仞還見麼良久云只在此山中雲深不知處示衆云田地穩密底人如羚羊掛角眹迹不留神通遊戲底人似枯木開花別迎春色忽若布漫天網子施陷虎之機便見七花八裂還有透得荊棘林底麼究竟窮極莫存軌則拈云百尺竿頭如何進步得到究竟處辭窮理極身喪力盡深窮之處不存一絲毫玄妙不存一絲毫奇特不存一絲毫佛法道理大用現前有什麼軌則掃地煎茶把針補衲隨分著衣喫飯堪報不報之恩更有什麼禪可參道可學雖然如此也須是實到此田地始得契心平等所作俱息拈云水長船高泥多佛大什麼處是不平等透得過見得徹運得此心平等受用無始劫來妄狂顛倒自然歇滅語默動靜綿綿無間念念在裏許念念常不昧所作所為悉皆頓息萬境萬差一時坐斷一一轉歸盡是自己無作妙用力諸人者若點撿得出實不虧人倘不如此向後大費力在狐疑淨盡正信調直拈云拶破面門識得麼明明向你說了也為什麼不知落處只為你肚裏有禪所以不快活你而今只管將古人言句玄妙公案築在肚皮裏將謂平生參學事畢殊不知盡是頑涎涕唾古人喚作運糞入污汝心田確實而論無一點墨若記箇元字腳萬劫作野狐精伶利漢聞舉著一時吐却淨洗娘生口直教心地空婁婁地自然不疑開口便見膽你尋常也道我信得及只是主張不曾有悟不是正信要會麼江上晚來堪畫處漁人披得一蓑歸一切不留無可記憶拈云直得堆山積嶽爭可不留還知落處麼你但虗洞𮌎懷無識無知心如墻壁瓦礫大死底人相似一向絶想絶念無絲毫氣息直下命根斷去終日雖在動用之中自然常處無為之境良久云不合恁麼道虗明自照不勞心力拈云縮却舌頭別舉來看良久云這箇境界無人識得不是你暫時作箇道理便當此事它古人歇來歇去口如臘月扇子心似枯木寒灰十度發言九度休去諸人者不是強為任運如此誵訛在什麼處江月照松風吹永夜清霄何所為非思量處識情難測拈云隨後來也你道是什麼這箇喚作現成公案到地頭語直是峭措直是奇特豈不見僧問雲門如何是非思量處門云識情難測雪竇道這僧下坡不走雲門快便難逢直得問處如函答處如蓋函蓋相應乾坤把定猶未夢見三祖在且道利害在什麼處影搖千尺龍蛇動聲撼半天風雨寒示衆云隱密全該現成公案高低普應日用無窮徒誇偃流掃影之機謾說劍刃鋒鋩之辨結草乖道人之志雕沙無鏤玉之談須是向上人方明向上事還有透關底麼真如法界無自無它拈云且莫茶胡這箇是什麼事教你恁麼道有者道無妄曰真不變曰如一心是法隨緣差別是法界此一真如躰不變是理法界隨緣差別事法界理無間事是理事無礙法界一一事法界融通無盡是事事無礙法界你若恁麼注解要見三祖大師年也未許你古人道青青翠竹盡是真如又作麼生豈不見鹽官問座主講什麼經主云華嚴經官云華嚴有幾種法界主云略說有四種廣說重重無盡官竪起拂子云者箇是第幾種主罔措官云思而知慮而解日下孤燈果然失照諸人者還知麼一著不到處滿盤空用心要急相應唯言不二拈云猶嫌少在那才落唇吻便是死門更無活路只是這句子千聖開口不得盡力要道亦道不出道不得不見文殊問維摩如何是不二法門維摩對它道什麼直得目瞪口呿四稜踏地無邊法門無邊妙義不消一點一時明得雖然如是更須知有一人呵呵大笑若識得此人管取不著草鞋錢不二皆同無不包容拈云一口吞盡更無滲漏任是河沙妙德普蘊其中百千道光皆從斯起法法平等佛佛道齊入不二法門聖凡同躰包納大虗含容萬象只在諸人現今立地不動纖毫一時成現恁麼承當去已是不著便過在什麼處禹力不到處河聲流向向十方智者皆入此宗拈云天下衲僧跳不出三世諸佛也入此宗六代祖師也入此宗天下老和尚皆入此宗現大神通作大佛事或下棒下喝作舞輥毬竪拂竪拳拽石搬土一言一句一機一境盡從此宗出直饒一出一入應變無窮也是周婆道底宗非促延一念萬年拈云萬里神光透頂透底促則只是一念延則豈止萬年空劫已前更已前也不離今時日用若能觀彼久遠猶如今日古今通始終同表裏情亡三世淨盡一條白練一念萬年只是箇無孔䥫槌一色邊事須知雲外千峯上別有靈松帶露寒無在不在十方目前拈云定動精神一時包褁縱是周遍十方心目前無法不在一切處意在目前若也一時坐斷無遠無近無在無不在乃至或取或放或縱或擒不由別人只是自己本有如是神通變化若能自證自用自擔自荷自作活計羅籠不住呼喚不回便能如是透網金鱗得大自在只如不是目前機亦非目前事又作麼生大衆擬議師云速禮三拜示衆云異類中行方解無情說法命根斷去自然不受人瞞要開空劫之門須掣無鑐之鎖天曉不露夜半正明無端打破畫餅便見許多狼籍還有洗得脫底麼極小同大妄絶境界拈云可煞奇特主丈子是小是大拈起則普天匝地塞壑填溝豈不是極小同大一毫頭上虗空大地一時總現豈不是極小同大坐微塵裏轉大法輪無邊香水海寶王剎也只向一毫端一微塵上歷歷現前豈不是極小同大等間竪起一指逼塞虗空無涯無岸豈不是極小同大又作麼生說妄絶境界底道理良久云達磨不會大難大難極大同小不見邊表拈云大地載不起虗空包不盡底一段大事只是在諸人眼中曰見耳中曰聞豈不是極大同小眼根也遍法界耳根也遍法界有什麼邊表據實而論盡十方世界只是箇火爐只是箇主丈子只在諸人眉毛眼睫上豈不是極大同小它古人向你道盡大地撮來如粟米粒大拋向面前漆桶不會依前竪窮橫遍恁麼去也還會麼過橋村酒美隔岸野花香有即是無無即是有拈云一欵便招更莫思前慮後一般底便說言語性空有無不可得又道有無只是名字皆是分別我口裏舉處便是豈更有二來又道有之與無從什麼處起只管認口頭聲色你恁麼會入地獄如箭只如僧問趙州狗子還有佛性也無州云有僧云既有為什麼撞入這皮袋州云為伊知而故犯又僧問狗子還有佛性也無州云無僧云一切衆生皆有佛性狗子為什麼無州云為伊有業識在而今兄弟皆道後面是蓋覆語緊要只在有無處苦哉滅胡種族有什麼交涉要見三祖趙州麼收取詩書歸舊院落花啼鳥一般春若不如是必不須守拈云猶較些子却許你具一隻眼又云恁麼恁麼無位真人常在面門出入無晝無夜無動無靜念念進向念念現前念念相應念念守護有之與無自然一串穿却你若狂狗逐塊隨語生解便是挽家散宅落在今時不能與主人翁相應如何得不落今時良久云月色靜中見松聲清夜聞一即一切一切即一拈云舌頭無骨一任七穿八穴提起盡大地人性命也只消一句子有者道一是一心一切是萬法萬法唯一心一心全萬法且喜沒交涉若恁麼開講做座主即得於衲僧門下更參百千萬年未許你在且作麼生是衲僧門下事踏著稱槌硬似䥫但能如是何慮不畢拈云猶缺一著在畢竟事作麼生禪和子多道一即一切一切即一法即是心心即是法但恁麼會參學事無不了畢且莫錯會好它祖師是大無事底人肚裏有許多葛藤堪作什麼諸人者你作麼生會它道但能如是何慮不畢良久云三人證龜成鱉信心不二不二信心拈云慚惶殺人又云識什麼好惡要你髑髏前喃喃地是什麼莫是信之與心更無有二麼且莫顛言倒語恁麼恁麼珊瑚枝枝撐著月參得透見得徹只消箇信心不二不二信心直得函蓋乾坤把定世界雖然如是若不得流水還應過別山言語道斷非去來今師噓一聲云三祖大師弓折箭盡雖然末後全提納一場敗關不同小小撿點得出語盡山雲海月情點撿不出依前不會還飛去有般底便主張道言語道斷非去來今便是至道無難唯嫌揀擇至道無難唯嫌揀擇便是言語道斷非去來今最初是末後句末後是最初句若恁麼依前打入鬼窟裏去諸人者應是三世諸佛六代祖師天下老和尚無邊法門無量妙義我今忍俊不禁只要一句子與你說破休休著甚來由間話古與今特地一場愁古人直得口邊白醭眼開懶閉諸人被寂菴推東劃西強生分別且道與古人如何雖然如是也要諸人知有非但三祖大師弓折箭盡寂菴亦是鎗折力乏家破人亡畢竟如何各請歸去休莫待雨霖頭當紹興間妙喜正統東山詆訾默照寂菴是舉可謂入其室操其戈取其矛擊其盾覽者當自得之義遠敬跋
